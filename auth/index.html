<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Redirecting… | Craystar Travel Agency</title>
<style>
  body { font-family: 'Open Sans', Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #0a1f44; color: #fff; text-align: center; }
  .wrap { max-width: 400px; padding: 24px; }
  .spinner { width: 36px; height: 36px; border: 4px solid rgba(212,175,55,.3); border-top-color: #d4af37; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { font-size: 1rem; line-height: 1.5; opacity: .85; }
  a { color: #d4af37; }
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <p id="msg">Redirecting you now…</p>
</div>
<script>
(function () {
  try {
    var params = new URLSearchParams(window.location.search);
    var first = params.get('f') || '';
    var last  = params.get('l') || '';
    var email = params.get('e') || '';
    var phone = params.get('p') || '';

    if (!first && !last && !email && !phone) throw new Error('missing');

    var base = 'https://form.jotform.com/261227631182048';
    var q = new URLSearchParams();
    if (first) q.set('q2_q2_fullname0[first]', first);
    if (last)  q.set('q2_q2_fullname0[last]', last);
    if (email) q.set('q3_q3_email1', email);
    if (phone) q.set('q4_q4_phone2[full]', phone);

    window.location.replace(base + '?' + q.toString());
  } catch (e) {
    document.getElementById('msg').innerHTML =
      'Something went wrong with this link.<br><a href="https://craystartravelagency.com/">Return to Craystar Travel</a>';
  }
})();
</script>
</body>
</html>
